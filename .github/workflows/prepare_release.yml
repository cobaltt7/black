name: prepare release

on:
  workflow_dispatch:
    inputs:
      Version_Override:
        type: string
  push:
    branches: ci/prepare-release

permissions: {}

jobs:
  create:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to new branch
      pull-requests: write # Needed to create PR

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true # Needed for git-auto-commit-action

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          pip-version: "25.3"
          pip-install: --group release

      - name: Prepare repo
        run: python scripts/release.py prepare "$VERSION"
        env:
          VERSION: ${{ inputs.Version_Override }}

      - name: Get version
        id: version
        run:
          echo "version=${VERSION:-$(python scripts/release.py version)}" >>
          "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ inputs.Version_Override }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message:
            ${{ format('Prepare release {0}', steps.version.outputs.version) }}
          branch: ci/prepare-release
          create_branch: true
          push_options: --force

      - name: Create release PR
        run: |
          gh pr create \
            -t "Prepare release $VERSION" \
            -l "ci: skip news" -l "C: maintenance" \
            -a "$USER"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          USER: ${{ github.triggering_actor }}
          VERSION: ${{ steps.version.outputs.version }}

  update:
    needs: create
    if:
      always() && (needs.create.result == 'skipped' || needs.create.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Needed to edit PR

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Write PR description
        run: |
          echo "Please follow the process in [the docs](https://black.readthedocs.io/en/latest/contributing/release_process.html#cutting-a-release) to cut a release." > description.md
          echo "<details><summary>Changelog Diff</summary>" >> description.md
          echo "" >> description.md
          echo "\`\`\`diff" >> description.md
          git diff origin/stable CHANGES.md >> description.md
          echo "\`\`\`" >> description.md
          echo "" >> description.md
          echo "</details>" >> description.md

      - name: Edit release PR
        run: |
          gh pr edit "$BRANCH" -F description.md
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH: ci/prepare-release
